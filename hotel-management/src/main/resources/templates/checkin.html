<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Grand Hotel — Заселение</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C96D;
            --dark: #0F0F0F;
            --dark2: #1A1A1A;
            --dark3: #252525;
            --text: #E8E4DC;
            --text-muted: #8A8480;
            --green: #4CAF7D;
            --red: #E05252;
            --border: rgba(201,168,76,0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 240px;
            background: var(--dark2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 32px 0;
            z-index: 100;
        }
        .logo { padding: 0 28px 32px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        .logo-icon { font-size: 1.8rem; margin-bottom: 6px; }
        .logo h1 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); line-height: 1.2; font-weight: 600; }
        .logo span { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
        nav { flex: 1; padding: 0 16px; }
        nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; transition: all 0.2s; }
        nav a:hover { color: var(--text); background: var(--dark3); }
        nav a.active { color: var(--gold); background: rgba(201,168,76,0.1); }
        nav a .icon { font-size: 1.1rem; width: 20px; text-align: center; }
        .sidebar-footer { padding: 20px 28px; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--text-muted); }

        .main { margin-left: 240px; min-height: 100vh; }
        .topbar { background: var(--dark2); border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .topbar h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 600; }

        .content { padding: 36px 40px; display: flex; justify-content: center; }

        .form-card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            position: relative;
            overflow: hidden;
        }
        .form-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light), transparent);
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 8px;
        }
        .form-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        .form-group { margin-bottom: 22px; }
        label { display: block; font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        input, select {
            width: 100%;
            padding: 13px 16px;
            background: var(--dark3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s;
            outline: none;
            appearance: none;
        }
        input:focus, select:focus { border-color: var(--gold); }
        input::placeholder { color: var(--text-muted); }
        select option { background: var(--dark3); }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
            letter-spacing: 0.3px;
        }
        .btn-submit:hover { background: var(--gold-light); }

        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
        .back-link:hover { color: var(--gold); }

        .empty-msg { text-align: center; padding: 40px 0; color: var(--text-muted); }
        .empty-msg .emoji { font-size: 3rem; margin-bottom: 12px; }

        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 24px; font-size: 0.88rem; }
        .alert-error { background: rgba(224,82,82,0.12); border: 1px solid rgba(224,82,82,0.3); color: #F08080; }

        .price-preview {
            margin-top: 16px;
            padding: 16px;
            background: rgba(201,168,76,0.08);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: none;
        }
        .price-preview.visible { display: block; }
        .price-preview-label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .price-preview-value { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">
        <div class="logo-icon">🏨</div>
        <h1>Grand Hotel</h1>
        <span>Management</span>
    </div>
    <nav>
        <a href="/"><span class="icon">🏠</span> Номера</a>
        <a href="/checkin" class="active"><span class="icon">➕</span> Заселение</a>
        <a href="/checkout"><span class="icon">🚪</span> Выселение</a>
        <a href="/history"><span class="icon">📋</span> История</a>
    </nav>
    <div class="sidebar-footer">Grand Hotel System v2.0</div>
</aside>

<main class="main">
    <div class="topbar">
        <h2>Заселение клиента</h2>
    </div>
    <div class="content">
        <div class="form-card">
            <div class="form-title">Новое заселение</div>
            <div class="form-subtitle">Заполните данные для регистрации гостя</div>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <div th:if="${availableRooms.empty}" class="empty-msg">
                <div class="emoji">🛏️</div>
                <p>Все номера заняты</p>
            </div>

            <form th:if="${!availableRooms.empty}" action="/checkin" method="post" id="checkinForm">
                <div class="form-group">
                    <label for="clientName">Имя гостя</label>
                    <input type="text" id="clientName" name="clientName" placeholder="Иванов Иван Иванович" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="roomId">Номер</label>
                    <select id="roomId" name="roomId" required onchange="updatePrice()">
                        <option value="">— Выберите номер —</option>
                        <option th:each="room : ${availableRooms}"
                                th:value="${room.id}"
                                th:data-price="${room.pricePerDay}"
                                th:text="'№ ' + ${room.roomNumber} + '  —  ' + ${room.pricePerDay} + ' ₽/день'">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="days">Количество дней</label>
                    <input type="number" id="days" name="days" min="1" max="365" placeholder="3" required oninput="updatePrice()">
                </div>

                <div class="price-preview" id="pricePreview">
                    <div class="price-preview-label">Итого к оплате</div>
                    <div class="price-preview-value" id="priceValue">—</div>
                </div>

                <button type="submit" class="btn-submit">Заселить гостя</button>
            </form>

            <a href="/" class="back-link">← Вернуться к списку номеров</a>
        </div>
    </div>
</main>

<script>
    function updatePrice() {
        const select = document.getElementById('roomId');
        const days = parseInt(document.getElementById('days').value);
        const option = select.options[select.selectedIndex];
        const price = parseFloat(option.dataset.price);
        const preview = document.getElementById('pricePreview');
        const value = document.getElementById('priceValue');

        if (price && days > 0) {
            const total = (price * days).toLocaleString('ru-RU');
            value.textContent = total + ' ₽';
            preview.classList.add('visible');
        } else {
            preview.classList.remove('visible');
        }
    }
</script>
</body>
</html>
