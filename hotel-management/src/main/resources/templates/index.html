<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Grand Hotel — Управление</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C96D;
            --dark: #0F0F0F;
            --dark2: #1A1A1A;
            --dark3: #252525;
            --text: #E8E4DC;
            --text-muted: #8A8480;
            --green: #4CAF7D;
            --red: #E05252;
            --border: rgba(201,168,76,0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 240px;
            background: var(--dark2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 32px 0;
            z-index: 100;
        }

        .logo {
            padding: 0 28px 32px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .logo-icon { font-size: 1.8rem; margin-bottom: 6px; }
        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--gold);
            line-height: 1.2;
            font-weight: 600;
        }
        .logo span {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav { flex: 1; padding: 0 16px; }
        nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 4px;
            transition: all 0.2s;
        }
        nav a:hover { color: var(--text); background: var(--dark3); }
        nav a.active { color: var(--gold); background: rgba(201,168,76,0.1); }
        nav a .icon { font-size: 1.1rem; width: 20px; text-align: center; }

        .sidebar-footer {
            padding: 20px 28px;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Main */
        .main {
            margin-left: 240px;
            min-height: 100vh;
        }

        .topbar {
            background: var(--dark2);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topbar h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
        }
        .topbar-date {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .content { padding: 36px 40px; }

        /* Alert */
        .alert {
            padding: 14px 20px;
            border-radius: 10px;
            margin-bottom: 28px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-success {
            background: rgba(76,175,125,0.12);
            border: 1px solid rgba(76,175,125,0.3);
            color: #6FCFA0;
        }
        .alert-error {
            background: rgba(224,82,82,0.12);
            border: 1px solid rgba(224,82,82,0.3);
            color: #F08080;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 36px;
        }
        .stat-card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), transparent);
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }
        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text);
        }
        .stat-value.gold { color: var(--gold); }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }

        /* Rooms grid */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            letter-spacing: 0.5px;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .room-card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            cursor: default;
        }
        .room-card:hover { transform: translateY(-3px); }
        .room-card.available { border-color: rgba(76,175,125,0.3); }
        .room-card.occupied  { border-color: rgba(224,82,82,0.3); }

        .room-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .room-card.available::after { background: var(--green); }
        .room-card.occupied::after  { background: var(--red); }

        .room-number {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .room-price {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 14px;
        }
        .room-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge-available {
            background: rgba(76,175,125,0.12);
            color: #6FCFA0;
            border: 1px solid rgba(76,175,125,0.25);
        }
        .badge-occupied {
            background: rgba(224,82,82,0.12);
            color: #F08080;
            border: 1px solid rgba(224,82,82,0.25);
        }

        /* Action buttons */
        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 36px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-gold {
            background: var(--gold);
            color: var(--dark);
        }
        .btn-gold:hover { background: var(--gold-light); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
        .btn-danger {
            background: rgba(224,82,82,0.15);
            border: 1px solid rgba(224,82,82,0.3);
            color: #F08080;
        }
        .btn-danger:hover { background: rgba(224,82,82,0.25); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">
        <div class="logo-icon">🏨</div>
        <h1>Grand Hotel</h1>
        <span>Management</span>
    </div>
    <nav>
        <a href="/" class="active">
            <span class="icon">🏠</span> Номера
        </a>
        <a href="/checkin">
            <span class="icon">➕</span> Заселение
        </a>
        <a href="/checkout">
            <span class="icon">🚪</span> Выселение
        </a>
        <a href="/history">
            <span class="icon">📋</span> История
        </a>
    </nav>
    <div class="sidebar-footer">
        Grand Hotel System v2.0
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <h2>Обзор номеров</h2>
        <div class="topbar-date" id="currentDate"></div>
    </div>

    <div class="content">

        <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>
        <div th:if="${error}"   class="alert alert-error">✕ <span th:text="${error}"></span></div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Всего номеров</div>
                <div class="stat-value gold" th:text="${rooms.size()}">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Свободно</div>
                <div class="stat-value green"
                     th:text="${rooms.stream().filter(r -> r.status.name() == 'AVAILABLE').count()}">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Занято</div>
                <div class="stat-value red"
                     th:text="${rooms.stream().filter(r -> r.status.name() == 'OCCUPIED').count()}">0</div>
            </div>
        </div>

        <!-- Actions -->
        <div class="actions">
            <a href="/checkin"  class="btn btn-gold">➕ Заселить клиента</a>
            <a href="/checkout" class="btn btn-danger">🚪 Выселить клиента</a>
            <a href="/history"  class="btn btn-outline">📋 История</a>
        </div>

        <!-- Rooms -->
        <div class="section-title">Все номера</div>
        <div class="rooms-grid">
            <div th:each="room : ${rooms}"
                 th:classappend="${room.status.name() == 'AVAILABLE'} ? 'available' : 'occupied'"
                 class="room-card">
                <div class="room-number" th:text="'№ ' + ${room.roomNumber}">101</div>
                <div class="room-price" th:text="${room.pricePerDay} + ' ₽ / день'"></div>
                <span th:if="${room.status.name() == 'AVAILABLE'}" class="room-badge badge-available">● Свободен</span>
                <span th:if="${room.status.name() == 'OCCUPIED'}"  class="room-badge badge-occupied">● Занят</span>
            </div>
        </div>

    </div>
</main>

<script>
    const d = new Date();
    document.getElementById('currentDate').textContent =
        d.toLocaleDateString('ru-RU', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
</script>
</body>
</html>F
